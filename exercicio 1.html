<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio</title>
</head>

<body>
    <H1>EXERCÍCIO PASSADO PELA SCTEC</H1>
    <form action="">
        <label for="nome">Nome Completo: </label>
        <input type="text" id="nome" name="nome"><br>

        <label for="email">Email: </label>
        <input type="email" id="email" name="email"><br>

        <label for="idade">Idade: </label>
        <input type="number" id="idade" name="idade"><br>

        <select name="materias" id="materia">
            <option value="matematica">Matemática</option>
            <option value="historia">Historia</option>
            <option value="geografia">Geografia</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option><br>
        </select>

        <select name="escolaridade" id="escolaridade">
            <option value="fundamental">Ensino Fundamental Completo</option>
            <option value="medio">Ensino Médio Completo</option>
            <option value="superior">Ensino Superior Completo</option><br>


        </select><br>

        <label for="descriçao">Descrição sobre Mim</label>
        <textarea name="descriçao" id="descriçao">Escreva Aqui</textarea>
    </form>
</body>

</html>
